services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: verum_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI → http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-verum}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-verum_pass}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: verum_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-verum}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-verum_pass}
      MONGO_INITDB_DATABASE: verum
    volumes:
      - mongodb_data:/data/db

  qdrant:
    image: qdrant/qdrant:latest
    container_name: verum_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: verum_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        SERVE_PID=$$!
        echo '[ollama-init] Waiting for Ollama API...'
        until ollama list >/dev/null 2>&1; do
          sleep 2
        done
        echo "[ollama-init] API ready. Checking model $$OLLAMA_MODEL ..."
        if ! ollama list 2>/dev/null | grep -q "$$OLLAMA_MODEL"; then
          echo "[ollama-init] Pulling $$OLLAMA_MODEL (first boot) ..."
          ollama pull "$$OLLAMA_MODEL"
          echo '[ollama-init] Pull complete.'
        else
          echo "[ollama-init] Model $$OLLAMA_MODEL already present."
        fi
        wait $$SERVE_PID
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null | grep -q \"$$OLLAMA_MODEL\""]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 180s
    # AMD ROCm GPU — uncomment on home-lab
    # devices:
    #   - /dev/kfd
    #   - /dev/dri

  # ── Application services ──────────────────────────────────────────────────

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: verum_gateway
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  worker_vision:
    build:
      context: .
      dockerfile: services/worker_vision/Dockerfile
    container_name: verum_worker_vision
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_started
    volumes:
      - ./models/vision/weights:/app/weights:ro
    restart: unless-stopped

  worker_nlp:
    build:
      context: .
      dockerfile: services/worker_nlp/Dockerfile
    container_name: verum_worker_nlp
    ports:
      - "9101:9101"   # Prometheus metrics → http://localhost:9101/metrics
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    depends_on:
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started
      mongodb:
        condition: service_started
      ollama:
        condition: service_started
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    container_name: verum_dashboard
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - mongodb
    restart: unless-stopped

  # ── ETL — run on-demand (cron or manual) ─────────────────────────────────

  etl:
    build:
      context: .
      dockerfile: services/etl/Dockerfile
    container_name: verum_etl
    env_file: .env
    depends_on:
      - qdrant
    profiles:
      - etl   # docker compose --profile etl run etl
  # etl_scheduler:  uncommented below — runs ETL on a cron schedule automatically
  etl_scheduler:
    build:
      context: .
      dockerfile: services/etl/Dockerfile
    container_name: verum_etl_scheduler
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      ETL_SCHEDULE: ${ETL_SCHEDULE:-0 */12 * * *}
    entrypoint: ["/bin/sh", "/app/cron/entrypoint.sh"]
    depends_on:
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "crontab -l 2>/dev/null | grep -q pipeline"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
  # ── Test runner — only started with --profile test (never with make up) ───

  test_runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: verum_test_runner
    profiles:
      - test
    env_file: .env
    volumes:
      - ./tests:/app/tests:ro
      - ./shared:/app/shared:ro
      - ./reports:/app/reports
    working_dir: /app

volumes:
  rabbitmq_data:
  mongodb_data:
  qdrant_data:
  ollama_data:
